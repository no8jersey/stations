<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Radio Switcher</title>
  <style>
    body {
      font-family: system-ui, -apple-system, Arial;
      padding: 15px;
      margin: 0;
      background-image: url("IMG_4432.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: white;
    }

    button {
      font-size: 18px;
      padding: 10px 14px;
      margin-right: 10px;
    }

    #name {
      font-size: 22px;
      margin: 0 0 12px;
    }

    #desc {
      font-size: 14px;
      font-style: italic;
      margin-top: 8px;
      margin-bottom: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <h1 id="name">вЂ”</h1>

  <audio id="player" controls></audio>

  <div id="desc">вЂ”</div>

  <div style="margin-top:14px;">
    <button id="prev">в—Ђ Prev</button>
    <button id="next">Next в–¶</button>
  </div>

  <script>
    const stations = [
      { name: "kurs", url: "https://listen9.myradio24.com/kursradio", description: "moscow рџ‡·рџ‡є" },
      { name: "oto", url: "https://listen1.myradio24.com/7859", description: "moscow рџ‡·рџ‡є" },
      { name: "rudina", url: "https://azuracast.datea.services:8000/radio.mp3", description: "vienna рџ‡¦рџ‡№" },
      { name: "noods", url: "https://noods-radio.radiocult.fm/stream", description: "bristol рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї" },
      { name: "mutant", url: "https://listen.radioking.com/radio/282820/stream/328621", description: "berlin рџ‡©рџ‡Є" },
      { name: "nts 1", url: "https://stream-relay-geo.ntslive.net/stream", description: "london рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї" },
      { name: "nts 2", url: "https://stream-relay-geo.ntslive.net/stream2", description: "london рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї" },
      { name: "skc", url: "https://skc.fm/listen/skc_radio/skc_hiq.mp3", description: "beograd рџ‡·рџ‡ё" },
      { name: "the lot", url: "https://nyc-prod-catalyst-0.lp-playback.studio/hls/video+85c28sa2o8wppm58/index.m3u8", description: "nyc рџ‡єрџ‡ё" },
      { name: "kiosk", url: "https://kioskradiobxl.out.airtime.pro/kioskradiobxl_b", description: "brussels рџ‡§рџ‡Є" }
    ];

    const player = document.getElementById("player");
    const nameEl = document.getElementById("name");
    const descEl = document.getElementById("desc");

    let i = 0;

    function play(idx) {
      i = (idx + stations.length) % stations.length;
      const s = stations[i];

      nameEl.textContent = s.name;
      descEl.textContent = s.description;
      player.src = s.url;

      player.play().catch(() => {});
    }

    document.getElementById("next").onclick = () => play(i + 1);
    document.getElementById("prev").onclick = () => play(i - 1);

    const randomIndex = Math.floor(Math.random() * stations.length);
    play(randomIndex);
  </script>
</body>
</html>
